# Notify.Console configuration
#
# IMPORTANT: This is an example file.
# Copy this to 'config.yaml' and add your actual credentials.
# The file 'config.yaml' is in .gitignore and will NOT be committed.
# NEVER commit real credentials to version control!
#
# Add profiles under each notification provider.

slack:
  my-profile:
    webhook_url: YOUR_WEBHOOK_URL_HERE

# Email configuration (Gmail API)
# OAuth setup required:
# 1. Create Google Cloud project: https://console.cloud.google.com
# 2. Enable Gmail API
# 3. Create OAuth 2.0 credentials (Desktop app)
# 4. Download client_secret.json
# 5. Place at: %APPDATA%\Notify.Console\gmail-credentials\{profile-name}\client_secret.json
#    (Windows) or ~/.config/notify-console/gmail-credentials/{profile-name}/client_secret.json (Unix)
email:
  work:
    provider: gmail
    from: your-email@company.com
    # Optional defaults
    # default_to: team@company.com
    # default_cc:
    #   - manager@company.com

  personal:
    provider: gmail
    from: your-email@gmail.com
